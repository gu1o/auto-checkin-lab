<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ideal Lab Check-in</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1 class="gradient-text">Ideal Lab Check-in</h1>
      <span class="version">v1.0.0</span>
    </header>

    <!-- Navigation Tabs -->
    <nav class="tabs-nav">
      <button class="tab-btn active" data-tab="checkin-tab">
        <svg viewBox="0 0 24 24" width="16" height="16" class="tab-icon"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Check-in
      </button>
      <button class="tab-btn" data-tab="config-tab">
        <svg viewBox="0 0 24 24" width="16" height="16" class="tab-icon"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Configurações
      </button>
    </nav>

    <main class="app-main">
      <!-- Check-in Tab -->
      <section id="checkin-tab" class="tab-content active">
        <div class="status-banner info" id="session-status">
          <span class="status-dot"></span>
          <span id="session-status-text">Verificando sessão com o Ideal Lab...</span>
        </div>

        <div class="form-group row">
          <div class="col">
            <label for="checkin-initiative">Iniciativa</label>
            <select id="checkin-initiative" class="form-control">
              <option value="6">6 - Auditoria Ideal</option>
              <option value="17">17 - Soluções Industriais</option>
            </select>
          </div>
          <div class="col flex-grow-0">
            <label for="checkin-confidence">Confiança</label>
            <select id="checkin-confidence" class="form-control width-auto">
              <option value="5" selected>5 - Excelente</option>
              <option value="4">4 - Boa</option>
              <option value="3">3 - Regular</option>
              <option value="2">2 - Baixa</option>
              <option value="1">1 - Crítica</option>
            </select>
          </div>
        </div>

        <div class="audit-header">
          <h3>Auditoria do Check-in</h3>
          <button type="button" class="btn btn-secondary btn-sm" id="btn-generate">
            <span class="spinner hidden" id="generate-spinner"></span>
            Gerar Rascunho
          </button>
        </div>

        <div class="form-group">
          <label for="checkin-yesterday">Ontem (Yesterday)</label>
          <textarea id="checkin-yesterday" class="form-control" rows="4" placeholder="O que você fez no último dia útil (será preenchido automaticamente, mas você pode editar)..."></textarea>
        </div>

        <div class="form-group">
          <label for="checkin-today">Hoje (Today)</label>
          <textarea id="checkin-today" class="form-control" rows="4" placeholder="O que fará hoje (será preenchido automaticamente, mas você pode editar)..."></textarea>
        </div>

        <div class="form-group row">
          <div class="col">
            <label for="checkin-blockers">Impedimentos</label>
            <input type="text" id="checkin-blockers" class="form-control" value="Nenhum">
          </div>
          <div class="col">
            <label for="checkin-artifact">URL de Artefato (PR/Doc)</label>
            <input type="url" id="checkin-artifact" class="form-control" placeholder="Opcional">
          </div>
        </div>

        <button type="button" class="btn btn-primary btn-block" id="btn-submit" disabled>
          Enviar Check-in
        </button>
      </section>

      <!-- Configuration Tab -->
      <section id="config-tab" class="tab-content">
        <form id="config-form">
          <!-- Jira Settings -->
          <div class="section-card">
            <h4>Jira Cloud</h4>
            <div class="form-group">
              <label for="jira-url">Jira URL</label>
              <input type="url" id="jira-url" class="form-control" placeholder="https://company.atlassian.net" required>
            </div>
            <div class="form-group row">
              <div class="col">
                <label for="jira-email">Email Atlassian</label>
                <input type="email" id="jira-email" class="form-control" placeholder="seu-email@company.com" required>
              </div>
              <div class="col">
                <label for="jira-token">Jira API Token</label>
                <input type="password" id="jira-token" class="form-control" placeholder="ATATT..." required>
              </div>
            </div>
          </div>

          <!-- Bitbucket Settings -->
          <div class="section-card">
            <h4>Bitbucket</h4>
            <div class="form-group">
              <label for="bb-token">API Token (ou App Password)</label>
              <input type="password" id="bb-token" class="form-control" placeholder="Token de acesso ou App Password">
            </div>
            <div class="form-group row">
              <div class="col">
                <label for="bb-username">Username Bitbucket</label>
                <input type="text" id="bb-username" class="form-control" placeholder="Ex: Marcone Santos (opcional se usar token)">
              </div>
              <div class="col">
                <label for="bb-workspace">Workspace ID</label>
                <input type="text" id="bb-workspace" class="form-control" placeholder="Ex: idealtrends">
              </div>
            </div>
            <div class="form-group">
              <label for="bb-repos">Repositórios (separados por vírgula)</label>
              <input type="text" id="bb-repos" class="form-control" placeholder="Ex: auditoriaideal.com.br, outro-repo (vazio para todos)">
            </div>
          </div>

          <!-- Gemini Settings -->
          <div class="section-card">
            <h4>Gemini AI</h4>
            <div class="form-group">
              <label for="gemini-key">Gemini API Key</label>
              <input type="password" id="gemini-key" class="form-control" placeholder="Chave da API do Google AI Studio">
            </div>
          </div>

          <!-- Telegram Settings -->
          <div class="section-card">
            <h4>Telegram (notificação se check-in estiver pendente às 11h)</h4>
            <div class="form-group row">
              <div class="col">
                <label for="tg-token">Bot Token</label>
                <input type="password" id="tg-token" class="form-control" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11">
              </div>
              <div class="col">
                <label for="tg-chat-id">Chat ID</label>
                <input type="text" id="tg-chat-id" class="form-control" placeholder="-1001234567890">
              </div>
            </div>
            <button type="button" class="btn btn-secondary btn-sm" id="btn-test-telegram">Testar</button>
            <span id="tg-test-status" class="test-status"></span>
            <button type="button" class="btn btn-secondary btn-sm" id="btn-test-notify" style="margin-left:6px">Simular pendência</button>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Salvar Configurações</button>
        </form>
      </section>
    </main>

    <!-- Toast Notification Banner -->
    <div id="toast" class="toast hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
